<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学星球 - Math Planet</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --primary: #39d353;
  --primary-dim: #1a7f37;
  --accent: #58a6ff;
  --gold: #ffd700;
  --red: #f85149;
  --orange: #f0883e;
  --purple: #a371f7;
  --text: #e6edf3;
  --muted: #8b949e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
body, button, input, select, textarea { font-size: 16px; }

/* ===== 头部 ===== */
.header { background: linear-gradient(135deg, #0d1117 0%, #1a3a1a 100%); border-bottom: 2px solid var(--primary-dim); padding: 12px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
.back-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.back-btn:hover { border-color: var(--primary); }
.header-title { font-size: 1.1rem; font-weight: 700; flex: 1; display: flex; align-items: center; gap: 8px; }
.grade-badge { background: var(--primary); color: #000; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
.xp-bar-wrap { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.xp-bar { width: 100px; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--primary-dim), var(--primary)); border-radius: 4px; transition: width 0.5s; }
.streak-badge { background: var(--orange); color: #000; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 700; }

/* ===== 页面容器 ===== */
.page { display: none; flex: 1; padding: 16px; max-width: 600px; margin: 0 auto; width: 100%; }
.page.active { display: flex; flex-direction: column; }

/* ===== 首页 ===== */
.home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
.game-card { background: var(--surface); border: 2px solid var(--border); border-radius: 14px; padding: 18px 14px; cursor: pointer; transition: all 0.25s; text-align: center; }
.game-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(57,211,83,0.15); }
.game-card .icon { font-size: 2.2rem; margin-bottom: 8px; }
.game-card h3 { font-size: 1rem; margin-bottom: 4px; }
.game-card p { font-size: 0.75rem; color: var(--muted); }
.game-card .stat { margin-top: 8px; font-size: 0.8rem; color: var(--gold); font-weight: 600; }
.daily-card { grid-column: 1 / -1; background: linear-gradient(135deg, var(--surface), #1a2a1a); border-color: var(--gold); }
.daily-card:hover { border-color: var(--gold); box-shadow: 0 6px 20px rgba(255,215,0,0.15); }

/* ===== 闯关模式 ===== */
.grade-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
.grade-btn { background: var(--surface2); border: 2px solid var(--border); color: var(--text); padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 600; text-align: center; transition: all 0.2s; }
.grade-btn:hover { border-color: var(--primary); }
.grade-btn.active { border-color: var(--primary); background: rgba(57,211,83,0.12); color: var(--primary); }
.topic-list { display: flex; flex-direction: column; gap: 8px; }
.topic-card { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
.topic-card:hover { border-color: var(--accent); transform: translateX(4px); }
.topic-card.locked { opacity: 0.4; cursor: not-allowed; }
.topic-icon { font-size: 1.8rem; }
.topic-info h4 { font-size: 0.95rem; margin-bottom: 2px; }
.topic-info p { font-size: 0.75rem; color: var(--muted); }
.topic-stars { margin-left: auto; font-size: 1rem; }

/* ===== 游戏区 ===== */
.game-area { flex: 1; display: flex; flex-direction: column; gap: 12px; }
.game-hud { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border-radius: 10px; padding: 10px 14px; font-size: 0.85rem; }
.hud-item { display: flex; align-items: center; gap: 5px; }
.hud-icon { font-size: 1.1rem; }
.timer { font-size: 1.1rem; font-weight: 700; color: var(--orange); font-variant-numeric: tabular-nums; }
.lives { font-size: 1.2rem; }
.question-box { background: var(--surface); border: 2px solid var(--border); border-radius: 14px; padding: 24px; text-align: center; }
.question-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
.question-hint { font-size: 0.8rem; color: var(--muted); }
.answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.answer-btn { background: var(--surface2); border: 2px solid var(--border); color: var(--text); padding: 14px; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.answer-btn:hover { border-color: var(--accent); background: rgba(88,166,255,0.1); }
.answer-btn.correct { border-color: var(--primary); background: rgba(57,211,83,0.2); color: var(--primary); animation: pop 0.3s; }
.answer-btn.wrong { border-color: var(--red); background: rgba(248,81,73,0.2); color: var(--red); animation: shake 0.3s; }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; background: var(--surface2); border: 2px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; font-size: 1.1rem; text-align: center; outline: none; }
.input-row input:focus { border-color: var(--accent); }
.submit-btn { background: var(--primary); color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
.feedback { text-align: center; padding: 10px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; display: none; }
.feedback.show { display: block; animation: fadeIn 0.3s; }
.feedback.win { background: rgba(57,211,83,0.15); color: var(--primary); }
.feedback.lose { background: rgba(248,81,73,0.15); color: var(--red); }
.prog-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--primary); transition: width 0.3s; border-radius: 3px; }

/* ===== 公式探秘 ===== */
.formula-card { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
.formula-card:hover { border-color: var(--purple); }
.formula-card h4 { color: var(--purple); margin-bottom: 8px; font-size: 0.9rem; }
.formula-math { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.formula-desc { font-size: 0.8rem; color: var(--muted); }
.match-area { display: flex; gap: 12px; margin-top: 16px; }
.match-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.match-col h5 { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; text-align: center; }
.match-item { background: var(--surface2); border: 2px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; user-select: none; }
.match-item:hover { border-color: var(--accent); }
.match-item.selected { border-color: var(--gold); background: rgba(255,215,0,0.1); }
.match-item.matched { border-color: var(--primary); background: rgba(57,211,83,0.15); color: var(--primary); pointer-events: none; }
.match-item.wrong-match { border-color: var(--red); animation: shake 0.3s; }

/* ===== 结果页 ===== */
.result-box { background: var(--surface); border: 2px solid var(--border); border-radius: 16px; padding: 28px 20px; text-align: center; margin-top: 20px; }
.result-icon { font-size: 4rem; margin-bottom: 12px; }
.result-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.result-score { font-size: 2.5rem; font-weight: 900; color: var(--gold); margin: 12px 0; }
.result-stats { display: flex; justify-content: center; gap: 24px; margin: 16px 0; font-size: 0.85rem; color: var(--muted); }
.result-stats span { color: var(--text); font-weight: 600; }
.result-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
.result-btn { background: var(--surface2); border: 2px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
.result-btn:hover { border-color: var(--primary); }
.result-btn.primary { background: var(--primary); color: #000; border-color: var(--primary); }
.result-btn.primary:hover { background: #2fc048; }

/* ===== 动画 ===== */
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.12); } 100% { transform: scale(1); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.page.active { animation: slideUp 0.3s; }

/* ===== 底部按钮 ===== */
.bottom-btns { display: flex; gap: 8px; margin-top: 12px; }
.btn { background: var(--surface2); border: 2px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
.btn:hover { border-color: var(--primary); }
.btn-primary { background: var(--primary); color: #000; border-color: var(--primary); }
.btn-primary:hover { background: #2fc048; }
.btn-back { margin-top: 16px; }

/* ===== 加载动画 ===== */
.loading { text-align: center; padding: 40px; color: var(--muted); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== 星星动画 ===== */
@keyframes starPop { 0% { transform: scale(0) rotate(0deg); opacity: 1; } 100% { transform: scale(1.8) rotate(180deg); opacity: 0; } }
.star-pop { position: fixed; font-size: 2rem; pointer-events: none; animation: starPop 0.6s forwards; z-index: 999; }

/* ===== 通知 ===== */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 10px; font-size: 0.9rem; z-index: 999; animation: fadeIn 0.3s; }
</style>
</head>
<body>

<!-- ===== 头部 ===== -->
<div class="header">
  <button class="back-btn" id="backBtn" onclick="goHome()">← 首页</button>
  <div class="header-title">
    <span>🧮</span>
    <span>数学星球</span>
    <span class="grade-badge" id="gradeBadge">一年级</span>
  </div>
  <div class="xp-bar-wrap">
    <span>⭐</span>
    <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <span id="xpText" style="font-size:12px;color:var(--gold)">0</span>
  </div>
</div>

<!-- ===== 首页 ===== -->
<div class="page active" id="homePage">
  <div style="padding:12px 0 4px;font-size:0.85rem;color:var(--muted);">选择学习模式</div>
  <div class="home-grid">
    <div class="game-card" onclick="showPage('gradePage')">
      <div class="icon">🎮</div>
      <h3>闯关练习</h3>
      <p>按年级知识点闯关</p>
      <div class="stat" id="stat-guanka">已通过 0 关</div>
    </div>
    <div class="game-card" onclick="showPage('formulaPage')">
      <div class="icon">📐</div>
      <h3>公式探秘</h3>
      <p>公式配对与记忆</p>
      <div class="stat" id="stat-formula">已记忆 0 条</div>
    </div>
    <div class="game-card" onclick="showPage('dailyPage')">
      <div class="icon">⚡</div>
      <h3>口算天天练</h3>
      <p>限时口算挑战</p>
      <div class="stat" id="stat-daily">连续 0 天</div>
    </div>
    <div class="game-card" onclick="showPage('wrongPage')">
      <div class="icon">📝</div>
      <h3>错题本</h3>
      <p>专攻易错题目</p>
      <div class="stat" id="stat-wrong">0 道错题</div>
    </div>
    <div class="game-card daily-card" onclick="showPage('dailyPage')">
      <div class="icon">🏆</div>
      <h3>每日一战 <span style="color:var(--gold)">⭐</span></h3>
      <p>限时挑战赛 今日剩余 1 次</p>
      <div class="stat" id="stat-rank">全国排名 —</div>
    </div>
  </div>
  <div class="bottom-btns" style="margin-top:20px;">
    <button class="btn" onclick="showPage('statsPage')">📊 学习统计</button>
  </div>
</div>

<!-- ===== 闯关 - 年级选择 ===== -->
<div class="page" id="gradePage">
  <div style="padding:8px 0 4px;font-size:0.85rem;color:var(--muted);">选择年级</div>
  <div class="grade-select" id="gradeSelect"></div>
  <div class="topic-list" id="topicList"></div>
  <div class="btn-back"><button class="btn" onclick="showPage('homePage')">← 返回首页</button></div>
</div>

<!-- ===== 闯关 - 游戏 ===== -->
<div class="page" id="gamePage">
  <div class="game-area">
    <div class="game-hud">
      <div class="hud-item"><span class="hud-icon">🎯</span><span id="qNum">1/10</span></div>
      <div class="hud-item"><span class="timer" id="timer">30</span><span style="color:var(--muted)">秒</span></div>
      <div class="hud-item"><span class="lives" id="lives">❤️❤️❤️</span></div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="question-box">
      <div class="question-text" id="questionText">Loading...</div>
      <div class="question-hint" id="questionHint"></div>
    </div>
    <div class="answer-grid" id="answerGrid"></div>
    <div id="feedback" class="feedback"></div>
  </div>
  <div class="btn-back"><button class="btn" onclick="confirmQuit()">← 退出</button></div>
</div>

<!-- ===== 公式探秘 ===== -->
<div class="page" id="formulaPage">
  <div style="padding:8px 0 4px;font-size:0.85rem;color:var(--muted);">选择年级公式</div>
  <div class="grade-select" id="formulaGradeSelect"></div>
  <div id="formulaList" style="margin-top:12px;"></div>
  <div id="matchArea" class="match-area" style="display:none;"></div>
  <div id="matchFeedback" class="feedback" style="margin-top:12px;"></div>
  <div class="btn-back"><button class="btn" onclick="showPage('homePage')">← 返回首页</button></div>
</div>

<!-- ===== 每日一战 ===== -->
<div class="page" id="dailyPage">
  <div class="game-area">
    <div class="game-hud">
      <div class="hud-item"><span class="hud-icon">⚡</span><span>每日挑战</span></div>
      <div class="hud-item"><span class="timer" id="dailyTimer">60</span><span style="color:var(--muted)">秒</span></div>
      <div class="hud-item"><span class="hud-icon">🏆</span><span id="dailyScore">0</span></div>
    </div>
    <div class="question-box">
      <div class="question-text" id="dailyQuestion">Loading...</div>
      <div class="question-hint" id="dailyHint"></div>
    </div>
    <div class="answer-grid" id="dailyAnswerGrid"></div>
    <div id="dailyFeedback" class="feedback"></div>
  </div>
  <div class="btn-back"><button class="btn" onclick="showPage('homePage')">← 退出挑战</button></div>
</div>

<!-- ===== 错题本 ===== -->
<div class="page" id="wrongPage">
  <div id="wrongList" style="margin-top:12px;"></div>
  <div id="wrongPracticeArea" style="display:none;"></div>
  <div class="btn-back"><button class="btn" onclick="showPage('homePage')">← 返回首页</button></div>
</div>

<!-- ===== 学习统计 ===== -->
<div class="page" id="statsPage">
  <div class="result-box" id="statsBox"></div>
  <div class="btn-back"><button class="btn" onclick="showPage('homePage')">← 返回首页</button></div>
</div>

<!-- ===== 结果页 ===== -->
<div class="page" id="resultPage">
  <div class="result-box">
    <div class="result-icon" id="resultIcon">🎉</div>
    <div class="result-title" id="resultTitle">太棒了！</div>
    <div class="result-score" id="resultScore">0</div>
    <div class="result-stats">
      <div>正确 <span id="resultCorrect">0</span></div>
      <div>用时 <span id="resultTime">0</span>秒</div>
      <div>连击 <span id="resultCombo">0</span></div>
    </div>
    <div class="result-btns">
      <button class="result-btn primary" onclick="restartGame()">🔄 再来一局</button>
      <button class="result-btn" onclick="showPage('homePage')">🏠 返回首页</button>
    </div>
  </div>
</div>

<script>
// ==================== 核心数据结构 ====================

// ==================== 闯关：生成题目 ====================

function startTopic(topicId) {
  var allTopics = [];
  ['g1','g2','g3','g4','g5','g6'].forEach(function(g) {
    [MATH_CONTENT[g].sem1, MATH_CONTENT[g].sem2].forEach(function(sem) {
      sem.topics.forEach(function(t) { allTopics.push(t); });
    });
  });
  var topic = allTopics.find(function(t) { return t.id === topicId; });
  if (!topic) return;

  currentTopic = topic;
  G = { score: 0, correct: 0, combo: 0, maxCombo: 0, lives: 3, qIndex: 0, totalQ: 10, questions: [], used: [], startTime: Date.now(), mode: 'topic' };
  genQuestions(topic, 10);
  showPage('gamePage');
  nextQuestion();
}

function genQuestions(topic, count) {
  G.questions = [];
  for (var i = 0; i < count; i++) {
    var q = genOneQuestion(topic);
    G.questions.push(q);
  }
}

function genOneQuestion(topic) {
  var t = topic.type;
  if (t === 'calc') return genCalcQ(topic);
  if (t === 'compare') return genCompareQ(topic);
  if (t === 'shape') return genShapeQ();
  if (t === 'fraction') return genFractionQ(topic);
  if (t === 'decimal') return genDecimalQ(topic);
  if (t === 'bigNumber') return genBigNumQ();
  if (t === 'wordproblem') return genWordProblemQ(topic);
  if (t === 'formula') return genFormulaQ(topic);
  if (t === 'ratio') return genRatioQ(topic);
  if (t === 'probability') return genProbQ();
  if (t === 'volume') return genVolumeQ(topic);
  if (t === 'chart') return genChartQ();
  // default
  return genCalcQ(topic);
}

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function genCalcQ(topic) {
  var ops = topic.ops;
  var op = ops[rnd(0, ops.length - 1)];
  var r = topic.range;
  var a, b, ans;
  if (op === '+') {
    if (topic.carry) {
      a = rnd(5, 15); b = rnd(1, 20 - a);
    } else if (r[1] > 1000) {
      a = rnd(r[0], r[1] - 100); b = rnd(50, Math.min(500, r[1] - a));
    } else {
      a = rnd(r[0], r[1]); b = rnd(r[0], Math.min(r[1], r[1] - a));
    }
    ans = a + b;
  } else if (op === '-') {
    if (topic.borrow) {
      a = rnd(11, 20); b = rnd(1, a - 1);
    } else if (r[1] > 1000) {
      a = rnd(r[0] + 100, r[1]); b = rnd(r[0], a - 1);
    } else {
      a = rnd(r[0], r[1]); b = rnd(r[0], a);
    }
    ans = a - b;
  } else if (op === '*') {
    if (topic.table) {
      a = rnd(2, 9); b = rnd(2, 9);
    } else if (topic.multi) {
      a = rnd(2, 9); b = rnd(10, 99);
    } else if (topic.multi2) {
      a = rnd(100, 999); b = rnd(10, 99);
    } else if (topic.decimal) {
      a = rnd(1, 20) + rnd(0, 9) / 10; b = rnd(1, 9) + rnd(0, 9) / 10; a = Math.round(a * 10) / 10; b = Math.round(b * 10) / 10;
    } else {
      a = rnd(2, 9); b = rnd(2, 9);
    }
    ans = a * b;
  } else if (op === '/') {
    if (topic.exact) {
      b = rnd(2, 9); ans = rnd(1, 9); a = b * ans;
    } else if (topic.decimal) {
      a = rnd(10, 100); b = rnd(2, 9); ans = a / b; ans = Math.round(ans * 10) / 10;
    } else {
      b = rnd(2, 9); ans = rnd(1, 9); a = b * ans;
    }
  } else {
    a = rnd(1, 10); b = rnd(1, 10); ans = a + b; op = '+';
  }
  var text = a + ' ' + op + ' ' + b + ' = ?';
  var choices = genChoices(ans, topic);
  return { text: text, answer: ans, choices: choices, topic: topic.id };
}

function genChoices(ans, topic) {
  var c = new Set();
  c.add(ans);
  while (c.size < 4) {
    var delta = rnd(1, Math.max(5, Math.floor(Math.abs(ans) * 0.3 + 1)));
    var sign = Math.random() > 0.5 ? 1 : -1;
    var wrong = ans + delta * sign;
    if (wrong > 0 && (topic.decimal ? Number.isFinite(wrong) : Number.isInteger(wrong))) {
      c.add(Math.round(wrong * 10) / 10);
    }
  }
  return shuffle(Array.from(c));
}

function genCompareQ(topic) {
  var a = rnd(1, topic.range[1]);
  var b = rnd(1, topic.range[1]);
  var ops = ['>', '<', '='];
  var op = ops[rnd(0, 2)];
  var ans = op;
  if (op === '>') ans = a > b ? '>' : (a === b ? '=' : '<');
  if (op === '<') ans = a < b ? '<' : (a === b ? '=' : '>');
  var text = a + ' ___ ' + b;
  var choices = ['>', '<', '='];
  return { text: text, answer: ans, choices: choices, topic: 'compare' };
}

function genShapeQ() {
  var shapes = [
    { name: '正方形', sides: 4, emoji: '⬜' },
    { name: '长方形', sides: 4, emoji: '▬' },
    { name: '三角形', sides: 3, emoji: '🔺' },
    { name: '圆形', sides: 0, emoji: '⭕' },
    { name: '平行四边形', sides: 4, emoji: '▱' },
  ];
  var s = shapes[rnd(0, shapes.length - 1)];
  var qType = rnd(1, 2);
  if (qType === 1) {
    return { text: s.emoji + '这是什么图形？', answer: s.name, choices: shuffle(shapes.map(function(x) { return x.name;; })), topic: 'shape' };
  } else {
    return { text: s.name + '有几个角？', answer: s.sides === 0 ? '没有角' : s.sides + '个角', choices: ['3个角', '4个角', '没有角', '5个角'], topic: 'shape' };
  }
}

function genFractionQ(topic) {
  var a = rnd(1, 9), b = rnd(a + 1, 10);
  var fa = a + '/' + b;
  var qType = rnd(1, 3);
  if (qType === 1) {
    return { text: fa + ' 涂色部分占几分之几？', answer: fa, choices: [fa, (a-1)+'/'+b, a+'/'+(b+1), (a+1)+'/'+b], topic: 'fraction' };
  }
  if (qType === 2) {
    var a2 = rnd(1, 9), b2 = rnd(a2+1, 10);
    var bigger = a * b2 > a2 * b ? fa : (a2+'/'+b2);
    return { text: fa + ' 和 ' + a2 + '/' + b2 + ' 哪个更大？', answer: bigger, choices: [fa, a2+'/'+b2], topic: 'fraction' };
  }
  var sum = (a + a2) + '/' + b;
  return { text: fa + ' + 1/' + b + ' = ?', answer: sum, choices: [sum, (a+1)+'/'+b, (a+2)+'/'+b, (a+1)+'/'+(b+1)], topic: 'fraction' };
}

function genDecimalQ(topic) {
  var a = rnd(1, 99) / 10;
  var b = rnd(1, 9) / 10;
  var qType = rnd(1, 3);
  if (qType === 1) {
    return { text: a.toFixed(1) + ' + ' + b.toFixed(1) + ' = ?', answer: (a+b).toFixed(1), choices: [(a+b).toFixed(1), (a+b+0.1).toFixed(1), (a+b-0.1).toFixed(1), (a+b+0.2).toFixed(1)], topic: 'decimal' };
  }
  return { text: a.toFixed(1) + ' - ' + b.toFixed(1) + ' = ?', answer: (a-b).toFixed(1), choices: [(a-b).toFixed(1), (a-b+0.1).toFixed(1), (a-b-0.1).toFixed(1), (a-b+0.2).toFixed(1)], topic: 'decimal' };
}

function genBigNumQ() {
  var num = rnd(1000, 9999);
  var text = '' + num;
  var qType = rnd(1, 2);
  if (qType === 1) {
    return { text: text + '读作？', answer: text.replace(/(\d)(?=(\d{3})+$)/g, '$1,'), choices: [text.replace(/(\d)(?=(\d{3})+$)/g, '$1,'), text.replace(/(\d)(?=(\d{3})+$)/g, '$1,').replace('0','1'), '写法不对'], topic: 'bigNumber' };
  }
  var digits = text.split('');
  var pos = ['个位','十位','百位','千位'][rnd(0,3)];
  return { text: text + '的' + pos + '是几？', answer: digits[['个位','十位','百位','千位'].indexOf(pos)], choices: [digits[['个位','十位','百位','千位'].indexOf(pos)], ''+rnd(0,9), ''+rnd(0,9)], topic: 'bigNumber' };
}

function genWordProblemQ(topic) {
  if (topic.subtype === 'chick rabbit') {
    var heads = rnd(7, 15);
    var feet = rnd(20, 35);
    var rabbit = Math.floor((feet - heads * 2) / 2);
    var chick = heads - rabbit;
    if (chick < 0 || rabbit < 0) return genWordProblemQ(topic);
    var text = '鸡兔同笼，头' + heads + '个，脚' + feet + '只。鸡？只，兔？只';
    return { text: '鸡兔同笼，头' + heads + '个，脚' + feet + '只。兔子有几只？', answer: rabbit, choices: genChoices(rabbit, {}), topic: topic.id, extra: 'chick=' + chick + ',rabbit=' + rabbit };
  }
  if (topic.subtype === 'average') {
    var scores = [rnd(60, 95), rnd(60, 95), rnd(60, 95)];
    var avg = Math.round((scores[0] + scores[1] + scores[2]) / 3);
    return { text: '小明三次数学成绩：' + scores.join('、') + '分。平均分？', answer: avg, choices: genChoices(avg, {}), topic: topic.id };
  }
  return { text: '练习应用题', answer: 0, choices: [0, 1, 2, 3], topic: topic.id };
}

function genFormulaQ(topic) {
  var texts = [
    { text: '长方形长5cm，宽3cm，面积是多少cm²？', answer: 15, choices: genChoices(15, {}) },
    { text: '三角形内角和是多少度？', answer: '180°', choices: ['180°', '360°', '90°', '120°'] },
    { text: topic.desc, answer: topic.formula, choices: [topic.formula, '错误公式', '不记得'], topic: topic.id },
  ];
  return texts[rnd(0, texts.length - 1)];
}

function genRatioQ(topic) {
  if (topic.advanced) {
    var a = rnd(2, 9), b = rnd(2, 9);
    return { text: a + ':' + b + ' 化简后是？', answer: a + ':' + b, choices: [a+':'+b, (a*2)+':'+(b*2), (a+1)+':'+(b+1), (a-1)+':'+(b-1)], topic: topic.id };
  }
  var a = rnd(1, 9), b = rnd(1, 9);
  return { text: a + '比' + b + '，比值是？', answer: (a/b).toFixed(2), choices: [(a/b).toFixed(2), (a*b).toFixed(2), (a+b).toFixed(2), ((a-b).toFixed(2))], topic: topic.id };
}

function genProbQ() {
  var colors = ['红球', '黄球', '蓝球'];
  var counts = [rnd(2,5), rnd(2,5), rnd(2,5)];
  var total = counts.reduce(function(a,b){return a+b;},0);
  var qType = rnd(1, 2);
  if (qType === 1) {
    var ci = rnd(0,2);
    return { text: '袋子里有' + colors[0] + counts[0]+'个，'+colors[1]+counts[1]+'个，'+colors[2]+counts[2]+'个。摸到' + colors[ci] + '的可能性？', answer: counts[ci]+'/'+total, choices: [counts[ci]+'/'+total, counts[(ci+1)%3]+'/'+total, '1/'+total, '不可能'], topic: 'probability' };
  }
  return { text: '抛硬币，正面朝上的可能性？', answer: '1/2', choices: ['1/2', '1/3', '1/4', '1'], topic: 'probability' };
}

function genVolumeQ(topic) {
  if (topic.shape === 'cylinder cone') {
    var r = rnd(1, 5), h = rnd(2, 8);
    var qType = rnd(1, 2);
    if (qType === 1) {
      return { text: '圆柱底面半径' + r + 'cm，高' + h + 'cm。体积？(π取3)', answer: Math.round(3*r*r*h), choices: genChoices(Math.round(3*r*r*h), {}), topic: topic.id };
    }
    return { text: '圆锥体积是圆柱的(等底等高)？', answer: '1/3', choices: ['1/3', '1/2', '2/3', '1'], topic: topic.id };
  }
  return { text: '体积练习', answer: 0, choices: [0, 1, 2, 3], topic: topic.id };
}

function genChartQ() {
  var data = [rnd(20,80), rnd(20,80), rnd(20,80), rnd(20,80), rnd(20,80)];
  var days = ['周一','周二','周三','周四','周五'];
  var mx = Math.max.apply(null, data);
  var mi = data.indexOf(mx);
  return { text: '小明一周跑步(分钟)：' + days.map(function(d,i){return d+data[i];}).join('、') + '。最高是哪天？', answer: days[mi], choices: days, topic: 'chart' };
}

// ==================== 游戏逻辑 ====================

var G = {};
var currentTopic = null;
var timerInterval = null;

function nextQuestion() {
  if (G.qIndex >= G.questions.length) {
    endGame();
    return;
  }
  var q = G.questions[G.qIndex];
  document.getElementById('qNum').textContent = (G.qIndex + 1) + '/' + G.totalQ;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('questionHint').textContent = '';
  document.getElementById('progFill').style.width = (G.qIndex / G.totalQ * 100) + '%';
  document.getElementById('lives').textContent = '❤️'.repeat(G.lives) + '🖤'.repeat(3 - G.lives);
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').style.display = 'none';

  var grid = document.getElementById('answerGrid');
  grid.innerHTML = '';
  q.choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = c;
    btn.onclick = (function(choice, q) {
      return function() { checkAnswer(choice, q); };
    })(c, q);
    grid.appendChild(btn);
  });

  // 计时器
  clearInterval(timerInterval);
  var timeLeft = G.mode === 'daily' ? 60 : 30;
  document.getElementById('timer').textContent = timeLeft;
  timerInterval = setInterval(function() {
    timeLeft--;
    var el = document.getElementById('timer');
    if (el) el.textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      checkAnswer('__timeout__', q);
    }
  }, 1000);
}

function checkAnswer(choice, q) {
  clearInterval(timerInterval);
  var correct = (choice === q.answer || choice === '__timeout__' ? false : String(choice) === String(q.answer));
  var btns = document.querySelectorAll('.answer-btn');
  btns.forEach(function(b) {
    b.style.pointerEvents = 'none';
    if (String(b.textContent) === String(q.answer)) b.className = 'answer-btn correct';
    if (!correct && b.textContent === choice) b.className = 'answer-btn wrong';
  });

  if (correct) {
    G.correct++;
    G.combo++;
    G.maxCombo = Math.max(G.maxCombo, G.combo);
    var comboBonus = G.combo >= 3 ? 10 : 0;
    G.score += 10 + comboBonus;
    showFeedback('win', '✅ 正确！+' + (10 + comboBonus) + (comboBonus > 0 ? ' (连击+' + comboBonus + ')' : ''));
    addStarPop();
  } else {
    G.lives--;
    G.combo = 0;
    var d = getMData();
    if (!d.wrongQueue) d.wrongQueue = [];
    var existing = d.wrongQueue.findIndex(function(w) { return w.q === q.text; });
    if (existing >= 0) {
      d.wrongQueue[existing].wrongCount++;
    } else {
      d.wrongQueue.push({ q: q.text, a: String(q.answer), topic: q.topic, wrongCount: 1 });
    }
    saveMData(d);
    showFeedback('lose', '❌ 正确答案是：' + q.answer);
    document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0,G.lives)) + '🖤'.repeat(3 - Math.max(0,G.lives));
    if (G.lives <= 0) {
      setTimeout(endGame, 1200);
      return;
    }
  }

  G.qIndex++;
  setTimeout(nextQuestion, 1000);
}

function showFeedback(type, text) {
  var el = document.getElementById('feedback') || document.getElementById('dailyFeedback');
  el.textContent = text;
  el.className = 'feedback show ' + type;
}

function addStarPop() {
  var star = document.createElement('div');
  star.className = 'star-pop';
  star.textContent = '⭐';
  star.style.left = (rnd(20, 80)) + '%';
  star.style.top = (rnd(30, 60)) + '%';
  document.body.appendChild(star);
  setTimeout(function() { star.remove(); }, 600);
}

function endGame() {
  clearInterval(timerInterval);
  var d = getMData();
  var elapsed = Math.round((Date.now() - G.startTime) / 1000);
  var stars = G.correct >= 9 ? 3 : G.correct >= 7 ? 2 : G.correct >= 5 ? 1 : 0;
  var xpGain = G.score;
  d.xp = (d.xp || 0) + xpGain;
  d.level = Math.floor(d.xp / 100) + 1;
  d.totalCorrect = (d.totalCorrect || 0) + G.correct;
  d.totalQuestions = (d.totalQuestions || 0) + G.qIndex;
  d.streak = checkStreak(d);

  // 通关检查
  if (G.mode === 'topic' && stars >= 1 && currentTopic) {
    if (!d.topicsCleared) d.topicsCleared = [];
    if (!d.topicsCleared.includes(currentTopic.id)) {
      d.topicsCleared.push(currentTopic.id);
    }
  }
  saveMData(d);

  // 显示结果
  var titles = ['继续加油！', '不错哦！', '很棒！', '太厉害了！🎉'];
  var icons = ['💪', '👍', '🌟', '🏆'];
  document.getElementById('resultIcon').textContent = icons[stars];
  document.getElementById('resultTitle').textContent = titles[stars];
  document.getElementById('resultScore').textContent = G.score + '分';
  document.getElementById('resultCorrect').textContent = G.correct + '/' + G.qIndex;
  document.getElementById('resultTime').textContent = elapsed;
  document.getElementById('resultCombo').textContent = G.maxCombo + 'x';
  showPage('resultPage');
}

function restartGame() {
  if (G.mode === 'topic' && currentTopic) {
    startTopic(currentTopic.id);
  } else if (G.mode === 'daily') {
    startDaily();
  }
}

function confirmQuit() {
  if (confirm('确定要退出吗？进度将不保存。')) {
    clearInterval(timerInterval);
    showPage('homePage');
  }
}

function checkStreak(d) {
  var today = new Date().toISOString().slice(0, 10);
  var yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (d.lastDate === yesterday || d.lastDate === today) {
    if (d.lastDate !== today) d.streak++;
  } else if (d.lastDate !== today) {
    d.streak = 1;
  }
  d.lastDate = today;
  return d.streak;
}

// ==================== 每日一战 ====================

function showPageDaily() { startDaily(); }

function startDaily() {
  var today = new Date().toISOString().slice(0, 10);
  var d = getMData();
  var rec = d.dailyRecord && d.dailyRecord[today];
  if (rec && rec.used) {
    showToast('今日已完成挑战！明天再来~');
    showPage('homePage');
    return;
  }
  G = { score: 0, correct: 0, combo: 0, maxCombo: 0, qIndex: 0, totalQ: 20, questions: [], startTime: Date.now(), mode: 'daily' };
  genDailyQuestions(20);
  showPage('dailyPage');
  nextDailyQuestion();
}

function genDailyQuestions(count) {
  G.questions = [];
  var grades = ['g1','g2','g3','g4','g5','g6'];
  for (var i = 0; i < count; i++) {
    var g = grades[rnd(0, 2)]; // 限制1-3年级难度
    var sem = rnd(0, 1) === 0 ? MATH_CONTENT[g].sem1 : MATH_CONTENT[g].sem2;
    var topic = sem.topics[rnd(0, sem.topics.length - 1)];
    G.questions.push(genOneQuestion(topic));
  }
}

function nextDailyQuestion() {
  if (G.qIndex >= G.questions.length) {
    endDaily();
    return;
  }
  var q = G.questions[G.qIndex];
  document.getElementById('qNum').textContent = (G.qIndex + 1) + '/' + G.totalQ;
  document.getElementById('dailyQuestion').textContent = q.text;
  document.getElementById('dailyScore').textContent = G.score;
  document.getElementById('progFill').style.width = (G.qIndex / G.totalQ * 100) + '%';

  clearInterval(timerInterval);
  var timeLeft = 60;
  document.getElementById('dailyTimer').textContent = timeLeft;
  timerInterval = setInterval(function() {
    timeLeft--;
    var el = document.getElementById('dailyTimer');
    if (el) el.textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      checkDailyAnswer('__timeout__', q);
    }
  }, 1000);

  var grid = document.getElementById('dailyAnswerGrid');
  grid.innerHTML = '';
  q.choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = c;
    btn.onclick = (function(choice, q) {
      return function() { checkDailyAnswer(choice, q); };
    })(c, q);
    grid.appendChild(btn);
  });
}

function checkDailyAnswer(choice, q) {
  clearInterval(timerInterval);
  var correct = (choice !== '__timeout__' && String(choice) === String(q.answer));
  var btns = document.querySelectorAll('#dailyAnswerGrid .answer-btn');
  btns.forEach(function(b) {
    b.style.pointerEvents = 'none';
    if (String(b.textContent) === String(q.answer)) b.className = 'answer-btn correct';
    if (!correct && b.textContent === choice) b.className = 'answer-btn wrong';
  });
  if (correct) {
    G.correct++;
    G.score += 5;
    G.combo++;
    G.maxCombo = Math.max(G.maxCombo, G.combo);
    showFeedback('win', '✅ +5分');
    addStarPop();
  } else {
    G.combo = 0;
    showFeedback('lose', '❌ ' + q.answer);
  }
  G.qIndex++;
  setTimeout(nextDailyQuestion, 800);
}

function endDaily() {
  clearInterval(timerInterval);
  var today = new Date().toISOString().slice(0, 10);
  var d = getMData();
  if (!d.dailyRecord) d.dailyRecord = {};
  var prev = d.dailyRecord[today];
  if (!prev || G.score > (prev.score || 0)) {
    d.dailyRecord[today] = { score: G.score, correct: G.correct, total: G.qIndex, date: today };
  }
  d.xp = (d.xp || 0) + G.score;
  d.level = Math.floor(d.xp / 100) + 1;
  d.totalCorrect = (d.totalCorrect || 0) + G.correct;
  d.totalQuestions = (d.totalQuestions || 0) + G.qIndex;
  d.streak = checkStreak(d);
  if (G.score > (d.gradeBest && d.gradeBest.gDaily || 0)) {
    if (!d.gradeBest) d.gradeBest = {};
    d.gradeBest.gDaily = G.score;
  }
  saveMData(d);

  document.getElementById('resultIcon').textContent = '🏆';
  document.getElementById('resultTitle').textContent = '每日挑战完成！';
  document.getElementById('resultScore').textContent = G.score + '分';
  document.getElementById('resultCorrect').textContent = G.correct + '/' + G.qIndex;
  document.getElementById('resultTime').textContent = '60';
  document.getElementById('resultCombo').textContent = G.maxCombo + 'x';
  G.mode = 'daily';
  showPage('resultPage');
}

// ==================== 公式探秘 ====================

var currentFormulaGrade = 'g1';
var matchState = { left: null, right: null };

function renderFormulaGradeSelect() {
  var grades = ['g1','g2','g3','g4','g5','g6'];
  var el = document.getElementById('formulaGradeSelect');
  el.innerHTML = grades.map(function(g) {
    return '<button class="grade-btn' + (g === currentFormulaGrade ? ' active' : '') + '" onclick="selectFormulaGrade(\'' + g + '\')">' + MATH_CONTENT[g].name + '</button>';
  }).join('');
  renderFormulaList();
}

function selectFormulaGrade(g) {
  currentFormulaGrade = g;
  document.getElementById('gradeBadge').textContent = MATH_CONTENT[g].name;
  renderFormulaGradeSelect();
}

function renderFormulaList() {
  var d = getMData();
  var flist = FORMULAS[currentFormulaGrade] || [];
  var learned = d.formulasLearned || [];
  var el = document.getElementById('formulaList');
  if (flist.length === 0) {
    el.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;">该年级暂无公式</div>';
    return;
  }
  el.innerHTML = '<div style="padding:4px 0 8px;color:var(--muted);font-size:0.8rem;">点击公式开始配对练习</div>' + flist.map(function(f, i) {
    var ok = learned.includes(currentFormulaGrade + '_' + i);
    return '<div class="formula-card' + (ok ? '" style="opacity:0.6;border-color:var(--primary);' : '') + '" onclick="startFormulaMatch(' + i + ')">' +
      '<h4>' + (ok ? '✅ ' : '📐 ') + f.desc + '</h4>' +
      '<div class="formula-math">' + f.math + '</div>' +
      '<div class="formula-desc">' + (ok ? '已掌握' : '点击练习') + '</div></div>';
  }).join('');
}

function startFormulaMatch(idx) {
  var flist = FORMULAS[currentFormulaGrade];
  if (!flist || !flist[idx]) return;
  var target = flist[idx];
  var allFormulas = [];
  var grades2 = ['g1','g2','g3','g4','g5','g6'];
  grades2.forEach(function(g) {
    (FORMULAS[g] || []).forEach(function(f, i) {
      allFormulas.push({ id: g + '_' + i, desc: f.desc, math: f.math });
    });
  });
  var wrong = allFormulas.filter(function(f) { return f.id !== currentFormulaGrade + '_' + idx; });
  var pool = shuffle(wrong).slice(0, 5);
  pool.push({ id: currentFormulaGrade + '_' + idx, desc: target.desc, math: target.math });
  pool = shuffle(pool);
  matchState = { target: pool.find(function(f) { return f.id === currentFormulaGrade + '_' + idx; }), pool: pool, answered: 0, total: 1 };

  var area = document.getElementById('matchArea');
  area.style.display = 'flex';
  var left = shuffle(pool.slice(0, 3));
  var right = shuffle([target]);
  area.innerHTML =
    '<div class="match-col"><h5>公式</h5>' + left.map(function(f) {
      return '<div class="match-item" data-id="' + f.id + '" data-side="left" onclick="selectMatch(this)">' + f.math + '</div>';
    }).join('') + '</div>' +
    '<div class="match-col"><h5>含义</h5>' + right.map(function(f) {
      return '<div class="match-item" data-id="' + f.id + '" data-side="right" onclick="selectMatch(this)">' + f.desc + '</div>';
    }).join('') + '</div>';
  document.getElementById('matchFeedback').className = 'feedback';
  document.getElementById('matchFeedback').style.display = 'none';
}

function selectMatch(el) {
  if (el.classList.contains('matched')) return;
  var side = el.dataset.side;
  var id = el.dataset.id;
  if (matchState.left && matchState.right) return;
  if (side === 'left' && matchState.left) {
    document.querySelectorAll('[data-side="left"]').forEach(function(e) { e.classList.remove('selected'); });
  }
  if (side === 'right' && matchState.right) {
    document.querySelectorAll('[data-side="right"]').forEach(function(e) { e.classList.remove('selected'); });
  }
  el.classList.add('selected');
  if (side === 'left') matchState.left = el;
  else matchState.right = el;

  if (matchState.left && matchState.right) {
    var leftId = matchState.left.dataset.id;
    var rightId = matchState.right.dataset.id;
    setTimeout(function() {
      if (leftId === rightId) {
        matchState.left.className = 'match-item matched';
        matchState.right.className = 'match-item matched';
        var fb = document.getElementById('matchFeedback');
        fb.textContent = '✅ 配对成功！';
        fb.className = 'feedback show win';
        var d = getMData();
        if (!d.formulasLearned) d.formulasLearned = [];
        if (!d.formulasLearned.includes(matchState.target.id)) {
          d.formulasLearned.push(matchState.target.id);
          d.xp = (d.xp || 0) + 5;
        }
        saveMData(d);
        addStarPop();
        setTimeout(function() {
          document.getElementById('matchArea').style.display = 'none';
          document.getElementById('matchFeedback').style.display = 'none';
          renderFormulaList();
        }, 1500);
      } else {
        matchState.left.className = 'match-item wrong-match';
        matchState.right.className = 'match-item wrong-match';
        var fb = document.getElementById('matchFeedback');
        fb.textContent = '❌ 配对失败，再试一次！';
        fb.className = 'feedback show lose';
        setTimeout(function() {
          document.querySelectorAll('[data-side="left"]').forEach(function(e) { e.classList.remove('selected', 'wrong-match'); });
          document.querySelectorAll('[data-side="right"]').forEach(function(e) { e.classList.remove('selected', 'wrong-match'); });
          matchState.left = null;
          matchState.right = null;
        }, 800);
      }
    }, 300);
  }
}

// ==================== 错题本 ====================

function renderWrongList() {
  var d = getMData();
  var qlist = d.wrongQueue || [];
  var el = document.getElementById('wrongList');
  if (qlist.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">🎉 太棒了！暂无错题</div>';
    return;
  }
  el.innerHTML = '<div style="padding:4px 0 8px;color:var(--muted);font-size:0.8rem;">错题本 (' + qlist.length + '道)</div>' + qlist.map(function(item, i) {
    return '<div class="topic-card" onclick="showWrongDetail(' + i + ')">' +
      '<div class="topic-icon">📝</div>' +
      '<div class="topic-info"><h4>' + (item.q.length > 30 ? item.q.slice(0,30) + '...' : item.q) + '</h4>' +
      '<p>答错 ' + item.wrongCount + ' 次 | 正确答案：' + item.a + '</p></div>' +
      '<div class="topic-stars">🔄</div></div>';
  }).join('');
}

function showWrongDetail(idx) {
  var d = getMData();
  var item = d.wrongQueue[idx];
  if (!item) return;
  var area = document.getElementById('wrongPracticeArea');
  area.style.display = 'block';
  area.innerHTML = '<div class="question-box" style="margin-bottom:12px;">' +
    '<div class="question-text">' + item.q + '</div></div>' +
    '<div class="input-row"><input id="wrongInput" placeholder="输入答案" onkeydown="if(event.key===\'Enter\')checkWrongInput(' + idx + ')"/>' +
    '<button class="submit-btn" onclick="checkWrongInput(' + idx + ')">提交</button></div>' +
    '<div id="wrongFb" class="feedback" style="margin-top:8px;"></div>' +
    '<button class="btn" style="margin-top:10px;" onclick="removeWrong(' + idx + ')">移除此题</button>';
  document.getElementById('wrongList').style.display = 'none';
}

function checkWrongInput(idx) {
  var d = getMData();
  var item = d.wrongQueue[idx];
  var input = document.getElementById('wrongInput');
  var val = input.value.trim();
  var correct = val === String(item.a) || val === item.a;
  var fb = document.getElementById('wrongFb');
  if (correct) {
    fb.textContent = '✅ 记住了！';
    fb.className = 'feedback show win';
    d.wrongQueue.splice(idx, 1);
    d.xp = (d.xp || 0) + 3;
    saveMData(d);
    setTimeout(function() {
      document.getElementById('wrongPracticeArea').style.display = 'none';
      document.getElementById('wrongList').style.display = 'block';
      renderWrongList();
    }, 1200);
  } else {
    fb.textContent = '❌ 再想想，正确答案是：' + item.a;
    fb.className = 'feedback show lose';
    item.wrongCount++;
    saveMData(d);
  }
}

function removeWrong(idx) {
  var d = getMData();
  d.wrongQueue.splice(idx, 1);
  saveMData(d);
  document.getElementById('wrongPracticeArea').style.display = 'none';
  document.getElementById('wrongList').style.display = 'block';
  renderWrongList();
}

// ==================== 学习统计 ====================

function renderStats() {
  var d = getMData();
  var total = d.totalQuestions || 0;
  var correct = d.totalCorrect || 0;
  var rate = total > 0 ? Math.round(correct / total * 100) : 0;
  var stars = d.topicsCleared ? d.topicsCleared.length : 0;
  document.getElementById('statsBox').innerHTML =
    '<div style="font-size:3rem;margin-bottom:8px;">📊</div>' +
    '<h3 style="margin-bottom:16px;">学习统计</h3>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center;">' +
    '<div><div style="font-size:1.8rem;color:var(--gold);font-weight:700;">' + d.xp + '</div><div style="font-size:0.8rem;color:var(--muted);">总经验值</div></div>' +
    '<div><div style="font-size:1.8rem;color:var(--primary);font-weight:700;">Lv.' + d.level + '</div><div style="font-size:0.8rem;color:var(--muted);">当前等级</div></div>' +
    '<div><div style="font-size:1.8rem;color:var(--accent);font-weight:700;">' + rate + '%</div><div style="font-size:0.8rem;color:var(--muted);">正确率</div></div>' +
    '<div><div style="font-size:1.8rem;color:var(--orange);font-weight:700;">' + stars + '</div><div style="font-size:0.8rem;color:var(--muted);">已通关</div></div>' +
    '<div><div style="font-size:1.8rem;color:var(--purple);font-weight:700;">' + (d.streak || 0) + '</div><div style="font-size:0.8rem;color:var(--muted);">连续天数</div></div>' +
    '<div><div style="font-size:1.8rem;color:var(--red);font-weight:700;">' + (d.wrongQueue ? d.wrongQueue.length : 0) + '</div><div style="font-size:0.8rem;color:var(--muted);">错题数</div></div>' +
    '</div>' +
    '<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);color:var(--muted);font-size:0.8rem;text-align:center;">' +
    '共练习 ' + total + ' 题 / 正确 ' + correct + ' 题</div>';
}

// ==================== 工具函数 ====================

function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2500);
}

// ==================== 初始化 ====================

(function init() {
  showPage('homePage');
})();
</script>
